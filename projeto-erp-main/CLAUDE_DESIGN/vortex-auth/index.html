<!-- @startingPoint section="VORTEX Auth" subtitle="Fluxo de autenticação completo — 6 telas, todos os estados" viewport="1280x860" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VORTEX — Autenticação</title>
<link rel="icon" href="../../assets/logo/favicon.svg" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; }
  #root { height: 100vh; }
  .nav-rail { width: 248px; flex-shrink: 0; background: var(--surface-card); border-right: 1px solid var(--border-default); display: flex; flex-direction: column; overflow-y: auto; }
  .nav-group { padding: 14px 14px 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--slate-400); }
  .screen-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 9px 14px; border: none; background: transparent; cursor: pointer; text-align: left; font-family: var(--font-sans); font-size: 14px; color: var(--text-body); border-left: 3px solid transparent; }
  .screen-btn:hover { background: var(--slate-50); }
  .screen-btn.active { background: var(--color-primary-tint); color: var(--color-primary); font-weight: 600; border-left-color: var(--color-primary); }
  .screen-btn .route { font-family: var(--font-mono); font-size: 10px; color: var(--slate-400); margin-left: auto; }
  .screen-btn.active .route { color: var(--color-primary); }
  .state-bar { display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: var(--surface-card); border-bottom: 1px solid var(--border-default); flex-wrap: wrap; }
  .state-bar .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-right: 4px; }
  .chip { padding: 5px 13px; border-radius: var(--radius-pill); border: 1px solid var(--border-strong); background: var(--surface-card); cursor: pointer; font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--text-body); }
  .chip.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
  .stage { flex: 1; overflow: auto; background: var(--bg-page); }
  .mode-toggle { display: flex; gap: 4px; padding: 12px 14px; }
  .mode-toggle button { flex: 1; padding: 7px; border-radius: var(--radius-md); border: 1px solid var(--border-strong); background: var(--surface-card); cursor: pointer; font-family: var(--font-sans); font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; justify-content: center; gap: 5px; }
  .mode-toggle button.active { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
  .flow-hint { padding: 12px 20px; background: var(--info-bg); color: var(--info-text); font-size: 13px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-default); }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js?v=1"></script>
  <script type="text/babel" src="AuthShell.jsx"></script>
  <script type="text/babel" src="AuthScreens.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { Icon } = window.VORTEXERPDesignSystem_6c8a4b;
    const S = window.AuthScreens;

    const SCREENS = [
      { key: 'Login', label: 'Login', route: '/login', icon: 'shield', states: ['form', 'loading', 'erro'] },
      { key: 'Cadastro', label: 'Cadastro', route: '/cadastro', icon: 'users', states: ['form', 'loading', 'validação', 'senhas ≠', 'e-mail em uso'] },
      { key: 'VerificarEmail', label: 'Verificar E-mail', route: '/verificar-email', icon: 'mail', states: ['info'] },
      { key: 'ContaConfirmada', label: 'Conta Confirmada', route: '/conta-confirmada', icon: 'circleCheck', states: ['aguardando', 'sucesso', 'erro'] },
      { key: 'EsqueciSenha', label: 'Esqueci a Senha', route: '/esqueci-senha', icon: 'refresh', states: ['form', 'enviado'] },
      { key: 'RedefinirSenha', label: 'Redefinir Senha', route: '/redefinir-senha', icon: 'settings', states: ['aguardando', 'form', 'erro', 'sucesso'] },
    ];

    function App() {
      const [mode, setMode] = React.useState('docs');   // 'docs' | 'flow'
      const [screen, setScreen] = React.useState('Login');
      const [state, setState] = React.useState('form');
      const [data, setData] = React.useState({});
      const [navKey, setNavKey] = React.useState(0);     // força remount no fluxo
      const def = SCREENS.find((s) => s.key === screen);

      function pickScreen(key) {
        setScreen(key);
        setState(SCREENS.find((s) => s.key === key).states[0]);
        setNavKey((k) => k + 1);
      }

      function flowNav(target, payload) {
        if (target === '__erp__') { window.location.href = '../vortex-erp/index.html'; return; }
        if (payload) setData((d) => ({ ...d, ...payload }));
        setScreen(target);
        setNavKey((k) => k + 1);
      }

      function switchMode(m) {
        setMode(m);
        setScreen('Login');
        setState('form');
        setData({});
        setNavKey((k) => k + 1);
      }

      const Comp = S[screen];
      const isFlow = mode === 'flow';
      const props = isFlow
        ? { onNav: flowNav, flow: true, data }
        : { onNav: pickScreen };
      if (!isFlow && def.states.length > 1) props.forcedState = state;

      return (
        <div style={{ display: 'flex', height: '100vh' }}>
          <div className="nav-rail">
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '18px 16px', borderBottom: '1px solid var(--border-default)' }}>
              <span style={{ width: 30, height: 30, borderRadius: 'var(--radius-md)', background: 'var(--color-primary)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <window.AuthKit.VortexMark size={19} color="#fff" />
              </span>
              <div>
                <div style={{ fontFamily: 'var(--font-display)', fontWeight: 800, fontSize: 15, color: 'var(--text-strong)' }}>VORTEX</div>
                <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>Autenticação</div>
              </div>
            </div>
            <div className="mode-toggle">
              <button className={mode === 'docs' ? 'active' : ''} onClick={() => switchMode('docs')}><Icon name="clipboard" size={14} /> Documentação</button>
              <button className={mode === 'flow' ? 'active' : ''} onClick={() => switchMode('flow')}><Icon name="arrowRight" size={14} /> Fluxo real</button>
            </div>
            <div className="nav-group">Telas</div>
            {SCREENS.map((s) => (
              <button key={s.key} className={'screen-btn' + (screen === s.key ? ' active' : '')} onClick={() => isFlow ? flowNav(s.key) : pickScreen(s.key)}>
                <Icon name={s.icon} size={16} />
                {s.label}
                <span className="route">{s.route}</span>
              </button>
            ))}
          </div>

          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
            {isFlow ? (
              <div className="flow-hint"><Icon name="arrowRight" size={15} /> Modo fluxo — interaja com as telas: envie os formulários e clique nos links para navegar de verdade.</div>
            ) : def.states.length > 1 ? (
              <div className="state-bar">
                <span className="lbl">ESTADO</span>
                {def.states.map((st) => (
                  <button key={st} className={'chip' + (state === st ? ' active' : '')} onClick={() => setState(st)}>{st}</button>
                ))}
              </div>
            ) : (
              <div className="state-bar"><span className="lbl">ESTADO</span><span className="chip active">{def.states[0]}</span></div>
            )}
            <div className="stage">
              <Comp key={navKey} {...props} />
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
