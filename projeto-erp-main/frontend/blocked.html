<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conta Bloqueada — Vortex ERP</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
</head>
<body class="auth-page">
  <!-- Página exibida quando a conta do usuário está bloqueada -->
  <main class="auth-container">
    <div class="auth-card auth-card--error">
      <div class="auth-logo">
        <img src="assets/img/logo.svg" alt="Vortex ERP" />
      </div>
      <div class="status-icon status-icon--blocked">🔒</div>
      <h1>Conta bloqueada</h1>
      <p class="auth-description">Sua conta foi bloqueada por excesso de tentativas de login ou por ação administrativa. Entre em contato com o suporte.</p>
      <a href="login.html" class="btn btn-outline">← Voltar ao login</a>
    </div>
  </main>
</body>
</html>
