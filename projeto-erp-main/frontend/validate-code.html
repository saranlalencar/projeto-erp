<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Validar Código — Vortex ERP</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
  <link rel="stylesheet" href="assets/css/forms.css" />
</head>
<body class="auth-page">
  <!-- Página de validação: o usuário informa o código recebido por e-mail -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/img/logo.svg" alt="Vortex ERP" />
      </div>
      <h1>Verificar código</h1>
      <p class="auth-description">Digite o código de 6 dígitos enviado para o seu e-mail.</p>
      <form id="form-validate" novalidate>
        <div class="form-group">
          <label for="code">Código de verificação</label>
          <input type="text" id="code" name="code" required maxlength="6" placeholder="000000" inputmode="numeric" pattern="[0-9]{6}" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Validar código</button>
      </form>
      <p class="auth-footer"><a href="forgot-password.html">← Reenviar código</a></p>
    </div>
  </main>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/validators.js"></script>
  <script src="assets/js/recovery.js"></script>
  <script>
    document.getElementById('form-validate').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      document.querySelectorAll('.field-error').forEach(el => el.remove());

      const code = document.getElementById('code').value.trim();
      const email = sessionStorage.getItem('vortex_recovery_email');

      if (!email) {
        window.location.href = 'forgot-password.html';
        return;
      }

      if (!Validators.isValidCode(code)) {
        showError('Informe um código de 6 dígitos.', btn);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Validando...';

      const result = await Recovery.validateCode(email, code);

      if (result.success) {
        window.location.href = 'reset-password.html';
      } else {
        btn.disabled = false;
        btn.textContent = 'Validar código';
        const msg = {
          codigo_invalido: 'Código inválido. Verifique e tente novamente.',
          codigo_expirado: 'Código expirado. Solicite um novo.',
          campos_obrigatorios: 'Preencha o código.',
        }[result.error] || 'Erro ao validar código.';
        showError(msg, btn);
      }
    });

    function showError(msg, btn) {
      const err = document.createElement('p');
      err.className = 'field-error';
      err.style.color = 'var(--error, #e53e3e)';
      err.style.marginTop = '8px';
      err.textContent = msg;
      btn.before(err);
    }
  </script>
</body>
</html>
