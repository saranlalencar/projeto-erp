<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redefinir Senha — Vortex ERP</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
  <link rel="stylesheet" href="assets/css/forms.css" />
</head>
<body class="auth-page">
  <!-- Página de redefinição: define nova senha após validação do código -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/img/logo.svg" alt="Vortex ERP" />
      </div>
      <h1>Nova senha</h1>
      <p class="auth-description">Escolha uma nova senha para a sua conta.</p>
      <form id="form-reset" novalidate>
        <div class="form-group">
          <label for="password">Nova senha</label>
          <input type="password" id="password" name="password" required placeholder="••••••••" />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirmar nova senha</label>
          <input type="password" id="confirm-password" name="confirmPassword" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Salvar nova senha</button>
      </form>
    </div>
  </main>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/validators.js"></script>
  <script src="assets/js/recovery.js"></script>
  <script>
    // Verificar se o resetToken existe antes de renderizar a página
    if (!sessionStorage.getItem('vortex_reset_token')) {
      window.location.href = 'forgot-password.html';
    }

    document.getElementById('form-reset').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      document.querySelectorAll('.field-error').forEach(el => el.remove());

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        showError('As senhas não coincidem.', btn);
        return;
      }

      const strength = Validators.passwordStrength(password);
      if (!strength.valid) {
        showError(strength.errors.join(' '), btn);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Salvando...';

      const email = sessionStorage.getItem('vortex_recovery_email') || '';
      const result = await Recovery.resetPassword(email, password);

      if (result.success) {
        sessionStorage.removeItem('vortex_recovery_email');
        window.location.href = 'login.html';
      } else {
        btn.disabled = false;
        btn.textContent = 'Salvar nova senha';
        const msg = {
          nao_validado: 'Sessão de recuperação inválida. Inicie novamente.',
          token_invalido: 'Link expirado. Inicie a recuperação novamente.',
          codigo_expirado: 'Código expirado. Solicite um novo.',
          erro_servidor: 'Erro ao conectar com o servidor.',
        }[result.error] || 'Erro ao redefinir a senha.';
        showError(msg, btn);
      }
    });

    function showError(msg, btn) {
      const err = document.createElement('p');
      err.className = 'field-error';
      err.style.color = 'var(--error, #e53e3e)';
      err.style.marginTop = '8px';
      err.textContent = msg;
      btn.before(err);
    }
  </script>
</body>
</html>
