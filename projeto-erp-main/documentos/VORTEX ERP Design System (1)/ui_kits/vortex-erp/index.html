<!-- @startingPoint section="VORTEX ERP" subtitle="Full ERP app shell — login + 5 modules" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VORTEX ERP</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; }
  body { margin: 0; }
  #root { height: 100vh; }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js?v=1"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="AppShell.jsx"></script>
  <script type="text/babel" src="LoginScreen.jsx"></script>
  <script type="text/babel" src="DashboardScreen.jsx"></script>
  <script type="text/babel" src="ClientesScreen.jsx"></script>
  <script type="text/babel" src="VendasScreen.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { AppShell, LoginScreen, DashboardScreen, ClientesScreen, VendasScreen } = window;

    function App() {
      const [logged, setLogged] = React.useState(false);
      const [route, setRoute] = React.useState('dashboard');

      if (!logged) return <LoginScreen onLogin={() => { setLogged(true); setRoute('dashboard'); }} />;

      let screen;
      switch (route) {
        case 'clientes': screen = <ClientesScreen />; break;
        case 'vendas': screen = <VendasScreen />; break;
        default: screen = <DashboardScreen onNavigate={setRoute} />;
      }

      return (
        <AppShell active={route} onNavigate={setRoute} onLogout={() => setLogged(false)}>
          {screen}
        </AppShell>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
