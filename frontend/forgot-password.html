<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha — Vortex ERP</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
  <link rel="stylesheet" href="assets/css/forms.css" />
</head>
<body class="auth-page">
  <!-- Página de recuperação: solicita e-mail para envio do código de recuperação -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/img/logo.svg" alt="Vortex ERP" />
      </div>
      <h1>Recuperar senha</h1>
      <p class="auth-description">Informe seu e-mail cadastrado para receber o código de recuperação.</p>
      <form id="form-forgot" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required placeholder="seu@email.com" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Enviar código</button>
      </form>
      <p class="auth-footer"><a href="login.html">← Voltar ao login</a></p>
    </div>
  </main>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/validators.js"></script>
  <script src="assets/js/recovery.js"></script>
  <script>
    document.getElementById('form-forgot').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      document.querySelectorAll('.field-error, .field-success').forEach(el => el.remove());

      const email = document.getElementById('email').value.trim();

      if (!Validators.isEmail(email)) {
        showMsg('Informe um e-mail válido.', 'error', btn);
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      // Salvar e-mail para usar na próxima etapa
      sessionStorage.setItem('vortex_recovery_email', email);

      const result = await Recovery.requestCode(email);

      if (result.success) {
        // API sempre retorna sucesso — redirecionar para validar código
        window.location.href = 'validate-code.html';
      } else {
        btn.disabled = false;
        btn.textContent = 'Enviar código';
        showMsg('Erro ao enviar código. Tente novamente.', 'error', btn);
      }
    });

    function showMsg(msg, type, btn) {
      const el = document.createElement('p');
      el.className = type === 'error' ? 'field-error' : 'field-success';
      el.style.color = type === 'error' ? 'var(--error, #e53e3e)' : 'var(--success, #38a169)';
      el.style.marginTop = '8px';
      el.textContent = msg;
      btn.before(el);
    }
  </script>
</body>
</html>
