<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Vortex ERP</title>
  <link rel="stylesheet" href="assets/css/global.css" />
  <link rel="stylesheet" href="assets/css/login.css" />
  <link rel="stylesheet" href="assets/css/forms.css" />
</head>
<body class="auth-page">
  <!-- Página de autenticação: formulário de login com e-mail e senha -->
  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/img/logo.svg" alt="Vortex ERP" />
      </div>
      <h1>Entrar na conta</h1>
      <form id="form-login" novalidate>
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" required autocomplete="email" placeholder="seu@email.com" />
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" required autocomplete="off" placeholder="••••••••" />
        </div>
        <div class="form-actions">
          <a href="forgot-password.html" class="link-forgot">Esqueceu a senha?</a>
          <button type="submit" class="btn btn-primary">Entrar</button>
        </div>
      </form>
      <p class="auth-footer">Não tem conta? <a href="register.html">Cadastre-se</a></p>
    </div>
  </main>

  <script src="assets/js/storage.js"></script>
  <script src="assets/js/session.js"></script>
  <script src="assets/js/api-client.js"></script>
  <script src="assets/js/validators.js"></script>
  <script src="assets/js/auth.js"></script>
  <script>
    document.getElementById('form-login').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button[type="submit"]');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Limpar erros anteriores
      document.querySelectorAll('.field-error').forEach(el => el.remove());

      btn.disabled = true;
      btn.textContent = 'Aguarde...';

      // DEBUG TEMPORÁRIO — remover após confirmar login
      console.log('[Login] Enviando:', { email, passwordLength: password.length, passwordPreview: password.substring(0,2) + '***' });

      const result = await Auth.login(email, password);

      if (result.success) {
        window.location.href = 'index.html';
      } else {
        btn.disabled = false;
        btn.textContent = 'Entrar';

        const msg = {
          credenciais_invalidas: `E-mail ou senha incorretos.${result.attemptsLeft != null ? ` Tentativas restantes: ${result.attemptsLeft}` : ''}`,
          conta_bloqueada: 'Conta bloqueada. Aguarde 15 minutos ou redefina sua senha.',
          erro_servidor: 'Erro ao conectar com o servidor. Tente novamente.',
        }[result.error] || 'Erro ao fazer login.';

        const err = document.createElement('p');
        err.className = 'field-error';
        err.style.color = 'var(--error, #e53e3e)';
        err.style.marginTop = '8px';
        err.textContent = msg;
        e.target.querySelector('.form-actions').before(err);
      }
    });
  </script>
</body>
</html>
